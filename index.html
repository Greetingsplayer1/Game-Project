<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Titan's Reach</title>

        <link rel="stylesheet" href="style.css">

        <link rel="icon" href="media/coinspin_transparent.gif">
    </head>
    <body>
        <noscript>
            <h1 style="color: red">You must enable JavaScript to play this game.</h1>
        </noscript>
        <h2>Stealth Game - Press 'E' for Stealth, 'Space' to Attack, 'Shift' to Sprint, 'F' to engage sword (cant use whils in stealth), 'Shift f' to sheathe it, 'P' to pause.</h2>
        
        <div id="canvasHolder">
            <canvas id="myCanvas" width="1000" height="800"></canvas>
                <div id="selectScreen">
                    <p>Select class to play as:</p>
                    <button onclick="chooseChar('rogue')">Rogue</button>
                    <button onclick="chooseChar('knight')">Knight</button>
                    <button onclick="chooseChar('bard')">Bard</button>
                    <button onclick="chooseChar('ranger')">Ranger</button>
                    <button onclick="chooseChar('barbarian')">Barbarian</button>
                    <button onclick="chooseChar('monk')">Monk</button>
                    <button onclick="chooseChar('fighter')" style="font-size: 13px">Human Fighter (Boring)</button>
                    <button onclick="chooseChar('sorcerer')">Sorcerer</button>
                    <button onclick="chooseChar('warlock')">Warlock</button>
                    <button onclick="chooseChar('wizard')">Wizard</button>
                    <button onclick="chooseChar('paladin')">Paladin</button>
                    <button onclick="chooseChar('artificer')">Artificer</button>
                    <button onclick="chooseChar('chris')" id="chrisBtn">Chris</button>
                    <button onclick="chooseChar('DEV')" id="DEVBtn">DEV</button>


                    <form id="testPass"  method="get">
                        <input type="text" id="passcode" placeholder="Enter secret code">
                        <button type="submit" action="submit" id="submitBtn" style="width: 50px; height: 56px;">Enter Code</button>
                    </form>
                </div>
                <br>
                <div id="devbuttons">
                    <button>hello</button>
                    <button>Reset Health</button>
                    <button>Resear Speed</button>
                    <button onclick="(() =>  {playerHP += 10, playerMaxHP += 10})()">+10 HP</button>
                    <button onclick="(() =>  {playerHP -= 10, playerMaxHP -= 10})()">-10 HP</button>
                    <button onclick="(() =>  {arrowCounter += 10})()">+10 arrows</button>
                    <button onclick="(() =>  {speedMultiplier += 10})()">+10 speed</button>
                    <button onclick="(() =>  {speedMultiplier -= 10})()">-10 speed</button>
                    <button onclick="(() =>  {arrowDamage += 10})()">+10 arrow damage</button>
                    <button onclick="(() =>  {arrowDamage -= 10})()">-10 arrow damage</button>
                    <button>Reset all</button>
                </div>
            <div id="imgHolder">
                <img id="coinImg">
            </div>
        </div>

        <img id="chris" src="media/chris.png">
        <img id="map" src="media/gameWorld.png">

        <script src="constants.js">//All of the constants</script>
        <script src="variables.js">//All of the variables</script>
        <script src="art.js">//Art for the enemies</script>
        <script src="functions.js">//All of the functions (Mostly animate).</script>
        <script src="listeners.js">//All of the event listeners</script>
        <script src="setup.js">//Runs at startup. Makes the colectibles and then runs animate.</script>
    </body>
</html>
