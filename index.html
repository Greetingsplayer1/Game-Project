<!DOCTYPE html>
<html lang="en">
<head>
    <title>Animate</title>
    <style>
        canvas { border: 1px solid black; background: #2d8a2d; }
    </style>
</head>
<body>
    <h2>Stealth Game - Press 'E' for Stealth, 'Space' to Attack, 'Shift' to Sprint, 'f' to engadge sword (cant use whils in stealth), 'Shift f' to sheathe it.</h2>
    <canvas id="myCanvas" width="1000" height="800"></canvas>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Variables
        let posX = -10; 
        let posY = 1500;
        let keys = {};
        let stealthActive = false;
        let bladeActive = false;
        let bladeHeight = 0; 
        let speedMultiplier = 1; 
        const sprintSpeed = 2; 
let isGameOver = false; // Tracks if the player is dead
const playerSize = 30;  // Used for collision math
let swordEquipped = false; // Is the sword drawn?
let isSwinging = false;    // Is the player currently attacking?
let swingTimer = 0;        // Animation duration
let isAttacking = false; // Add this to stop the error!
let bladeCooldown = 0; //makes hidden blade have a cooldown
let swordCooldown = 0; // 0 means ready to swing
const SWORD_COOLDOWN_TIME = 50; // 60 frames = 1 second at 60FPS
let playerHP = 100;
const playerMaxHP = 100;
let damageCooldown = 0; // Prevents losing all health in one frame
let collectibles = [];




        const mapObjects = [
            // MOAT SECTIONS (Solid borders)
    {x: -1500, y: -1400, w: 3000, h: 200, color: '#006994', isSolid: true},  // Top
    {x: -1500, y: -1200, w: 500,  h: 2300, color: '#006994', isSolid: true}, // Left
    {x: 1000,  y: -1200, w: 500,  h: 2300, color: '#006994', isSolid: true}, // Right
    {x: -1500, y: 1100,  w: 1300, h: 200,  color: '#006994', isSolid: true}, // Bottom Left
    {x: 200,   y: 1100,  w: 1300, h: 200,  color: '#006994', isSolid: true}, // Bottom Right (Gap in middle)
    // BUILDINGS (Solid)
    {x: -200, y: -400, w: 400, h: 1600, color: '#a89968', isSolid: false},
            {x: -1000, y: -1200, w: 2000, h: 2000, color: '#2d8a2d', isSolid: false}, 
            {x: -200, y: -400, w: 400, h: 1600, color: '#a89968', isSolid: false},    
            {x: -200, y: -300, w: 400, h: 200, color: '#5d4037', isSolid: false},     
            {x: -200, y: -250, w: 400, h: 10, color: '#3e2723', isSolid: false},      
            {x: -800, y: -900, w: 1600, h: 600, color: '#808080',isSolid: true},   
            {x: -800, y: -1100, w: 250, h: 800, color: '#666',isSolid: true},      
            {x: 550, y: -1100, w: 250, h: 800, color: '#666',isSolid: true},       
            {x: -250, y: -950, w: 500, h: 650, color: '#555',isSolid: false},  
            {x: -150, y: -600, w: 300, h: 300, color: '#3e2723', isGate: true,isSolid: true},
    ];

    function isSpaceBlocked(newX, newY) {
    for (let obj of mapObjects) {
        // ONLY check collision if the object is marked as solid
        if (obj.isSolid) { 
            if (newX < obj.x + obj.w &&
                newX + playerSize > obj.x &&
                newY < obj.y + obj.h &&
                newY + playerSize > obj.y) {
                return true; // Collision detected with a solid object
            }
        }
    }
    return false; // Path is clear or object is walkable
}




        //this is guards that patrol need normal players
        let enemies = [
    { 
        x: 300, y: 300, 
           hp: 100, maxHp: 100, // <--- New Health Variables
        homeX: 300, homeY: 300, 
        patrolX: 300, patrolY: 1020, // The "other end" of their walk
        size: 40, color: 'white', 
        isDead: false, respawnTimer: 0, scaredTimer: 0,
        angle: 0,
        movingToPatrol: true // To track which way they are walking
    },
    { 
        x: -400, y: 300, 
           hp: 100, maxHp: 100, // <--- New Health Variables
        homeX: -400, homeY: 300, 
        patrolX: -400, patrolY: 1020, // The "other end" of their walk
        size: 40, color: 'white', 
        isDead: false, respawnTimer: 0, scaredTimer: 0,
        angle: 0,
        movingToPatrol: true // To track which way they are walking
    }
];

let civilians = [
    { x: 100, y: 100, homeX : 100, homeY: 500, size: 35, color: 'cyan', isScared: false, scaredTimer: 0,angle: 0, wanderTimer:0, returnHomeCooldown: 0, hp : 50, maxHp: 50, isDead: false},
    { x: -600, y: 200, homeX : -600, homeY: 200, size: 35, color: 'cyan', isScared: false, scaredTimer: 0,angle: 0, wanderTimer:0, returnHomeCooldown: 0, hp : 50, maxHp: 50, isDead: false}
];


function spawnItem(newX, newY) {
    let item = {x: newX, y: newY, size: 10};
    collectibles.push(item);
}

spawnItem(200, 300);
spawnItem(-400, 100);
spawnItem(500, 500);



        function drawRect(x, y) {
        ctx.save();

           if (stealthActive) {
        ctx.globalAlpha = 0.5; 
    } else {
        ctx.globalAlpha = 1.0;
    }
                   // 1. Stealth Check
    ctx.globalAlpha = stealthActive ? 0.5 : 1.0;

    // --- LEGS (Short & Wide for a sturdy look) ---
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 2, y + 65, 12, 25);
    ctx.fillRect(x + 22, y + 65, 12, 25);

    // --- CAPE / CLOAK BACK (The base layer) ---
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(x - 15, y + 20);
    ctx.lineTo(x + 50, y + 20);
    ctx.lineTo(x + 60, y + 90); // 90px height limit
    ctx.lineTo(x - 25, y + 90);
    ctx.fill();

    // --- BROAD SHOULDERED TORSO (The 'V' Shape) ---
    ctx.fillStyle = '#2c2c2c';
    ctx.beginPath();
    ctx.moveTo(x - 10, y + 15); // Left Shoulder
    ctx.lineTo(x + 45, y + 15); // Right Shoulder
    ctx.lineTo(x + 30, y + 70); // Waist
    ctx.lineTo(x + 5, y + 70);  // Waist
    ctx.closePath();
    ctx.fill();

    // --- ARMOR PADS (Adds complexity) ---
    ctx.fillStyle = '#3d3d3d';
    ctx.fillRect(x - 12, y + 15, 15, 10); // Left pad
    ctx.fillRect(x + 32, y + 15, 15, 10); // Right pad

    // --- THE HOOD (Deep & Shadowed) ---
    // Outer Hood
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(x + 18, y + 5, 28, Math.PI, 0); // Arched top
    ctx.lineTo(x + 46, y + 25);
    ctx.lineTo(x - 10, y + 25);
    ctx.fill();

    // Face Opening (Shadow)
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(x + 18, y + 12, 18, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // GLOWING EYES (The 'Assassin' Look)
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 5;
    ctx.shadowColor = "white"; // Makes them glow
    ctx.fillRect(x + 10, y + 5, 6, 2); 
    ctx.fillRect(x + 22, y + 5, 6, 2);
    ctx.shadowBlur = 0; // Reset glow

            // Blade
            if (bladeHeight > 0) {
                ctx.fillStyle = 'silver';
                ctx.fillRect(x - 14, y + 65, 4, bladeHeight); 
            }
            
            //sword
            if (swordEquipped) {
        ctx.save();
        ctx.translate(x + 15, y + 40); // Centered on player
        
        if (isSwinging) ctx.rotate(Math.PI / 2); 
        else ctx.rotate(-Math.PI / 4); 

        ctx.fillStyle = "silver";
        ctx.fillRect(0, -5, 60, 10); 
        ctx.fillStyle = "gold";
        ctx.fillRect(5, -15, 5, 30);
        ctx.fillStyle = "brown";
        ctx.fillRect(-10, -3, 15, 6);

      ctx.restore();
    }
      ctx.restore();
} ;
            

        function animate() {  
    let cameraX = posX - (canvas.width / 2) + 15; 
    let cameraY = posY - (canvas.height / 2) + 15;

    ctx.setTransform(1, 0, 0, 1, 0, 0); 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 

    ctx.fillStyle = "#2d8a2d"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height); 
    
    ctx.translate(-cameraX, -cameraY);

    // Movement
if (!isGameOver) {
    let baseSpeed = stealthActive ? 4 : 10;
    let currentSpeed = baseSpeed * speedMultiplier;

    // Check Horizontal movement
    if (keys['d'] && !isSpaceBlocked(posX + currentSpeed, posY)) posX += currentSpeed;
    if (keys['a'] && !isSpaceBlocked(posX - currentSpeed, posY)) posX -= currentSpeed;

    // Check Vertical movement
    if (keys['w'] && !isSpaceBlocked(posX, posY - currentSpeed)) posY -= currentSpeed;
    if (keys['s'] && !isSpaceBlocked(posX, posY + currentSpeed)) posY += currentSpeed;
}

    // Blade Animation
    if (bladeActive && bladeHeight < 25) bladeHeight += 5;
    if (!bladeActive && bladeHeight > 0) bladeHeight -= 5;

    // Draw World
    mapObjects.forEach(obj => {
        ctx.fillStyle = obj.color;
        ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
    });


    // --- ENEMY LOGIC ---
                     enemies.forEach(enemy => {
        if (enemy.isDead) {
            enemy.respawnTimer--;
            if (enemy.respawnTimer <= 0) {
                enemy.isDead = false;
                enemy.x = enemy.homeX; 
                enemy.y = enemy.homeY;
            }
            return; 
        }

        let dx = posX - enemy.x;
        let dy = posY - enemy.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        let angleToPlayer = Math.atan2(dy, dx);
        let angleDiff = Math.abs((enemy.angle || 0) - angleToPlayer);
        if (angleDiff > Math.PI) angleDiff = Math.PI * 2 - angleDiff;  
        let canSeePlayer = (distance < 400 && angleDiff < Math.PI / 2 && !stealthActive && (bladeActive || swordEquipped));
        let tooClose = (distance < 40 && !stealthActive && (bladeActive || swordEquipped));

// 2. Trigger the Chase:
// The guard only gets "scared" (aggressive) if one of those is true
if (canSeePlayer || tooClose) {
    enemy.scaredTimer = 600;
}

        if ((enemy.scaredTimer || 0) > 0) {
    enemy.scaredTimer--;
    enemy.color = 'red';
    let angleToPlayer = Math.atan2(dy, dx);
    
    // Calculate intended next step
    let nextX = enemy.x + Math.cos(angleToPlayer) * 7;
    let nextY = enemy.y + Math.sin(angleToPlayer) * 7;

    // Only move if the NEW space is not blocked
    if (!isSpaceBlocked(nextX, enemy.y)) enemy.x = nextX;
    if (!isSpaceBlocked(enemy.x, nextY)) enemy.y = nextY;

    enemy.angle = angleToPlayer; 
} else {
            enemy.color = 'tan';
            let destX = enemy.movingToPatrol ? enemy.patrolX : enemy.homeX;
            let destY = enemy.movingToPatrol ? enemy.patrolY : enemy.homeY;
            let hDx = destX - enemy.x;
            let hDy = destY - enemy.y;
            let distToDest = Math.sqrt(hDx * hDx + hDy * hDy);

            if (distToDest > 5) {
                let aMove = Math.atan2(hDy, hDx);
                enemy.x += Math.cos(aMove) * 4;
                enemy.y += Math.sin(aMove) * 4;
                enemy.angle = aMove; 
            } else {
                enemy.movingToPatrol = !enemy.movingToPatrol;
            }
        }

let isColliding = 
    enemy.x < posX + playerSize &&
    enemy.x + enemy.size > posX &&
    enemy.y < posY + playerSize &&
    enemy.y + enemy.size > posY;

// If touching and enemy isn't already dead, trigger Game Over
// --- Inside enemies.forEach ---
if (isColliding && !enemy.isDead && damageCooldown === 0) {
    playerHP -= 10;      // Lose 10 health per hit
    damageCooldown = 30; // Wait 0.5 seconds before taking damage again
    
    if (playerHP <= 0) {
        playerHP = 0;
        isGameOver = true;
    }
}


        // Draw Vision Cone
        ctx.save();
        ctx.translate(enemy.x + 20, enemy.y + 20);
        ctx.rotate(enemy.angle || 0);
        ctx.fillStyle = "rgba(255, 255, 0, 0.15)";
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.arc(0, 0, 400, -Math.PI/2, Math.PI/2);
        ctx.fill();
        ctx.restore();

        // Draw Enemy
        ctx.fillStyle = enemy.color;
        ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);
        ctx.fillRect(enemy.x + -12, enemy.y + 5, 10, 25);
        ctx.fillRect(enemy.x + 42, enemy.y + 5, 10, 25);
        ctx.fillRect(enemy.x, enemy.y + 45, 10, 25);
        ctx.fillRect(enemy.x + 30, enemy.y + 45, 10, 25);
        ctx.fillRect(enemy.x - 0, enemy.y - 40, 40, 35);

        if (!enemy.isDead) {
    let barWidth = 50;
    let barHeight = 6;
    let barX = enemy.x + (enemy.size / 2) - (barWidth / 2);
    let barY = enemy.y - 55; // 15 pixels above their head

    // 1. Background (Red - Missing Health)
    ctx.fillStyle = "red";
    ctx.fillRect(barX, barY, barWidth, barHeight);

    // 2. Foreground (Green - Current Health)
    let currentHealthWidth = (enemy.hp / enemy.maxHp) * barWidth;
    ctx.fillStyle = "lime";
    ctx.fillRect(barX, barY, currentHealthWidth, barHeight);
}
        
    });

    civilians.forEach(civ => {
        if (civ.isDead) return;
        let dx = posX - civ.x;
        let dy = posY - civ.y;
        let distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 300 && (bladeActive || swordEquipped) && !stealthActive) {
            civ.isScared = true;
            civ.scaredTimer = 300;
        }

        if (civ.scaredTimer > 0) {
            civ.scaredTimer--;
            civ.color = 'pink';
            let angleAway = Math.atan2(dy, dx) + Math.PI;

            let nextX = civ.x + Math.cos(angleAway) * 5;
        let nextY = civ.y + Math.sin(angleAway) * 5;

        if (!isSpaceBlocked(nextX, civ.y)) civ.x = nextX;
        if (!isSpaceBlocked(civ.x, nextY)) civ.y = nextY;

            if (civ.scaredTimer === 0) civ.isScared = false;
        }   else {
            // 1. MUST HAVE: Tick down the timer
            if (!civ.returnHomeCooldown) civ.returnHomeCooldown = 0; 
            if (civ.returnHomeCooldown > 0) civ.returnHomeCooldown--;

            let destX = civ.homeX;
            let destY = civ.homeY;
            let distToHome = Math.sqrt((destX - civ.x)**2 + (destY - civ.y)**2);

            // 2. UNIFIED LOGIC: One check for moving home
            if (distToHome > 100 || civ.returnHomeCooldown > 0) {
                
                // Set the lock if they just went out of bounds
                if (distToHome > 100 && civ.returnHomeCooldown <= 0) {
                    civ.returnHomeCooldown = 60; 
                }

                let angleHome = Math.atan2(destY - civ.y, destX - civ.x);
                civ.x += Math.cos(angleHome) * 2;
                civ.y += Math.sin(angleHome) * 2;
                civ.color = 'cyan';

            } else {
                // 3. WANDER: Runs only when close AND timer is 0
                civ.wanderTimer--;
                if (civ.wanderTimer <= 0) {
                    civ.angle = Math.random() * Math.PI * 2;
                    civ.wanderTimer = 60 + Math.random() * 120;
                }
                let nextX = civ.x + Math.cos(civ.angle) * 1;
                let nextY = civ.y + Math.sin(civ.angle) * 1;

                if (!isSpaceBlocked(nextX, nextY)) {
                    civ.x = nextX;
                    civ.y = nextY;
                }
            }
        } // This bracket closes the "else" (not scared) block

        //setting dimesions for health
        let barWidth = 40; //sets width
        let barHeight = 6; //sets height
        let barX = civ.x + (civ.size / 2) - (barWidth / 2); //centers above head
        let barY = civ.y -15 //determians pixles above head

        ctx.fillStyle = "red";
        ctx.fillRect(barX, barY, barWidth, barHeight)

        let healthPercent = civ.hp / civ.maxHp;
        ctx.fillStyle = "lime";
ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);

        // Draw Civilian
        ctx.fillStyle = civ.color;
        ctx.fillRect(civ.x, civ.y, civ.size, civ.size);
    }); // This bracket closes the civilians.forEach

collectibles.forEach(col => {
    ctx.fillStyle = 'gold'; // 1. Pick a color (like gold for coins!)
    
    // 2. Draw the rectangle using the item's x, y, and size
    ctx.fillRect(col.x, col.y, col.size, col.size); 
});


    // --- DRAW PLAYER ---
    drawRect(posX, posY);

// --- 1. RESET TRANSFORM FOR UI ---
// This moves the "pen" back to the top-left of your screen, ignoring the camera
ctx.setTransform(1, 0, 0, 1, 0, 0); 

// --- 2. DRAW PLAYER HEALTH BAR ---
ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; // Background
ctx.fillRect(20, 20, 200, 25);

ctx.fillStyle = playerHP > 30 ? "lime" : "red"; // Turns red when low!
let healthWidth = (playerHP / 100) * 200;
ctx.fillRect(20, 20, healthWidth, 25);

ctx.strokeStyle = "white";
ctx.strokeRect(20, 20, 200, 25);

// --- 3. Add Hidden Status ---
ctx.font = "bold 18px sans-serif";
ctx.textAlign = "left";
if (stealthActive) {
    ctx.fillStyle = "cyan";
    ctx.fillText("STATUS: HIDDEN", 20, 70);
} else {
    ctx.fillStyle = "white";
    ctx.fillText("STATUS: VISIBLE", 20, 70);
}

// --- 4. Add Weapon Status ---
ctx.fillStyle = "white";
let weaponText = swordEquipped ? "SWORD DRAWN" : "NO WEAPON";
let weaponText2 = bladeActive ? "HIDDEN BLADE" : "NO WEAPON";
ctx.fillText(weaponText, 20, 100)
ctx.fillText(weaponText2, 20, 130)
// --- 5. DRAW DEATH SCREEN ---
if (isGameOver) {
    ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "red";
    ctx.font = "bold 60px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("ELIMINATED", canvas.width / 2, canvas.height / 2);
    
    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.fillText("Press 'R' to Restart", canvas.width / 2, canvas.height / 2 + 60);
}


if (isSwinging) {
    swingTimer--;
    if (swingTimer <= 0) isSwinging = false;
}

if (bladeCooldown > 0) {
bladeCooldown--;
}

if (swordCooldown > 0) {
    swordCooldown--;
}

if (damageCooldown > 0) damageCooldown--;



        requestAnimationFrame(animate)

        }   

   animate();

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = true;
            if (key === 'e') stealthActive = !stealthActive;
            if (key === 'shift') speedMultiplier = sprintSpeed;
            if (key === ' ' && bladeCooldown === 0) {
    bladeActive = true;
    bladeCooldown = 300; 

    // 1. Attack Enemies
    enemies.forEach(enemy => {
        let d = Math.sqrt((posX - enemy.x)**2 + (posY - enemy.y)**2);
        if (d < 150 && !enemy.isDead) { 
            enemy.hp -= 100; // Instant kill
            if (enemy.hp <= 0) {
                enemy.isDead = true; 
                enemy.respawnTimer = 400; 
                enemy.hp = enemy.maxHp;
            }
        }
    }); // This correctly cldwoses the enemy loop 
}
           if (key === 'r' && isGameOver) {


            civilians.forEach(civ => {
    civ.x = civ.homeX;
    civ.y = civ.homeY;
    civ.isScared = false;

});

    // 1. Reset Player Stat
    posX = -10; 
    posY = 1300;
    playerHP = 100; // Reset health to full
    isGameOver = false;

    // 2. Reset All Enemies
    enemies.forEach(enemy => {
        enemy.x = enemy.homeX;
        enemy.y = enemy.homeY;
        enemy.hp = 100; // Reset enemy health too
        enemy.scaredTimer = 0;
        enemy.isDead = false;
        enemy.color = 'white';
    });
}

if (key === 'f') {
    
      if (stealthActive) stealthActive = false;
      if (keys['shift']) {
            swordEquipped = false; // Hold Shift + F to sheathe
            isSwinging = false;
        } else if (!swordEquipped) {
            swordEquipped = true;  // Press F to draw sword
        } else {
            isSwinging = true;     // Press F while drawn to swing
            swingTimer = 30; // Duration of swing animation
            
            if (key === 'f') {
    if (!swordEquipped) {
        swordEquipped = true; 
    } else if (swordCooldown === 0) { // <--- ONLY swing if cooldown is 0
        isSwinging = true;
        swingTimer = 30; // Swing animation lasts for 30 frames
        swordCooldown = SWORD_COOLDOWN_TIME; // <--- Start the 1-second timer

        enemies.forEach(enemy => {
            let d = Math.sqrt((posX - enemy.x)**2 + (posY - enemy.y)**2);
            //sets the distance and enemy can ataack form
            if (d < 330 && !enemy.isDead) { 
                enemy.hp -= 25; // Using the health bars we talked about!
                if (enemy.hp <= 0) {
                    enemy.isDead = true;
                    enemy.respawnTimer = 400;
                    enemy.hp = 100; 
                }
            }
        });

         civilians.forEach(civ => {
            let d = Math.sqrt((posX - civ.x)**2 + (posY - civ.y)**2);
            //sets the distance and enemy can ataack form
            if (d < 330 && !civ.isDead) { 
                civ.hp -= 25; // Using the health bars we talked about!
                if (civ.hp <= 0) {
                    civ.isDead = true;
                    civ.respawnTimer = 400;
                    civ.hp = 50; 
                }
            }
        });
    }
}
        }
    }

        }); 

        

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            keys[key] = false;
            if (key === ' ') bladeActive = false;
            if (key === 'shift') speedMultiplier = 1;
        });
    </script>
</body>
</html>
